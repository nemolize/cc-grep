name: Build and Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    name: build (node ${{ matrix.node-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22", "24"]
    # Override only the Node major from the matrix; pnpm still comes from
    # mise.toml. Tests the engines floor (>=20) across supported majors, while
    # mise.toml's pinned Node stays the local-dev default.
    env:
      MISE_NODE_VERSION: ${{ matrix.node-version }}
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up mise (Node ${{ matrix.node-version }} + pnpm)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run type-check

      - name: Run unit tests
        run: pnpm run test

      - name: Build
        run: pnpm run build
